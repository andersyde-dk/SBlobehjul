<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ScootShop – Genbrugte løbehjul</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1916; --text2: #6b6960; --text3: #a09e96;
    --accent: #1a1a2e; --accent2: #e94560;
    --green-bg: #e1f5ee; --green-text: #0f6e56;
    --red-bg: #fcebeb; --red-text: #a32d2d;
    --mp-bg: #eef1ff; --mp-border: #c5d2ff; --mp-text: #3c3489; --mp-sub: #534ab7;
    --radius: 12px; --radius-sm: 8px;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
  .nav-tabs { position: absolute; top: 12px; right: 12px; z-index: 10; display: flex; gap: 6px; }
  .tab { padding: 7px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font); transition: all .15s; background: rgba(0,0,0,0.55); color: white; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  .tab:hover { background: rgba(0,0,0,0.8); }
  .tab.active { background: white; color: var(--accent); }
  .hero { position: relative; border-radius: var(--radius); margin-bottom: 0; overflow: hidden; }
  .hero img { width: 100%; display: block; border-radius: var(--radius); }
  .hero-bar { display: flex; justify-content: center; padding: 10px 16px; background: #111; border-radius: 0 0 var(--radius) var(--radius); margin-top: -4px; }
  .mp-badge { display: inline-flex; align-items: center; gap: 9px; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.22); border-radius: 50px; padding: 7px 18px; font-size: 13px; font-weight: 500; color: white; }
  .mc { width: 22px; height: 22px; border-radius: 50%; background: #5a78ff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: white; flex-shrink: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s, box-shadow .15s; }
  .card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .card-img { height: 140px; background: var(--surface2); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img .emoji-fallback { font-size: 56px; }
  .badge { position: absolute; top: 10px; right: 10px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
  .av { background: var(--green-bg); color: var(--green-text); }
  .so { background: var(--red-bg); color: var(--red-text); }
  .card-body { padding: 13px 15px; }
  .card-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .card-sub { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .price { font-size: 16px; font-weight: 600; }
  .btn-row { display: flex; gap: 5px; }
  .views-chip { font-size: 11px; color: var(--text3); margin-top: 7px; }
  .btn { font-size: 13px; padding: 7px 13px; border-radius: var(--radius-sm); cursor: pointer; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: var(--font); font-weight: 500; transition: all .15s; }
  .btn:hover { background: var(--surface2); }
  .btn:disabled { opacity: .45; cursor: default; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: #2e2e50; border-color: #2e2e50; }
  .btn-danger { border-color: #f09595; color: var(--red-text); }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-full { width: 100%; padding: 12px; font-size: 15px; }
  .back-link { font-size: 13px; color: var(--text2); cursor: pointer; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 5px; }
  .back-link:hover { color: var(--text); }
  .detail-imgs { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 16px; }
  .detail-main { background: var(--surface2); border-radius: var(--radius); height: 220px; display: flex; align-items: center; justify-content: center; font-size: 80px; border: 0.5px solid var(--border); overflow: hidden; cursor: pointer; }
  .detail-main img { width: 100%; height: 100%; object-fit: cover; }
  .thumbs { display: grid; gap: 8px; }
  .thumb { background: var(--surface2); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; border: 0.5px solid var(--border); cursor: pointer; min-height: 62px; overflow: hidden; transition: border-color .15s; }
  .thumb:hover, .thumb.active { border-color: var(--accent); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .detail-meta { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start; margin-bottom: 14px; }
  .detail-name { font-size: 21px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.3px; }
  .detail-desc { font-size: 14px; color: var(--text2); line-height: 1.65; }
  .detail-price { font-size: 24px; font-weight: 600; white-space: nowrap; }
  .detail-price-sub { font-size: 11px; color: var(--text2); text-align: right; }
  .specs { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 15px; margin-bottom: 14px; border: 0.5px solid var(--border); }
  .spec-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
  .spec-row:last-child { border: none; }
  .spec-k { color: var(--text2); }
  .spec-v { font-weight: 600; }
  .mp-box { background: var(--mp-bg); border: 0.5px solid var(--mp-border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px; }
  .mp-title { font-size: 13px; font-weight: 600; color: var(--mp-text); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
  .mp-num { font-family: var(--mono); font-size: 20px; color: var(--mp-text); letter-spacing: 1px; margin-bottom: 4px; }
  .mp-sub { font-size: 12px; color: var(--mp-sub); line-height: 1.5; }
  .co-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .co-btn { padding: 10px; text-align: center; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; background: var(--surface); font-family: var(--font); font-weight: 500; transition: background .15s; }
  .co-btn:hover { background: var(--surface2); }
  .checkout-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
  .checkout-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 0.5px solid var(--border); }
  .steps { display: flex; gap: 6px; margin-bottom: 20px; }
  .step-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background .3s; }
  .step-bar.done { background: var(--accent); }
  .step-bar.active { background: #5a78ff; }
  .checkout-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .fl { margin-bottom: 13px; }
  .fl label { font-size: 12px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 4px; }
  .fl input, .fl textarea, .fl select { width: 100%; font-size: 14px; font-family: var(--font); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 12px; background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; }
  .fl input:focus, .fl textarea:focus { border-color: var(--accent); }
  .fl textarea { height: 70px; resize: vertical; }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .err { font-size: 12px; color: var(--red-text); min-height: 16px; margin-bottom: 8px; }
  .two-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .order-summary { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 16px; border: 0.5px solid var(--border); }
  .order-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
  .order-total { font-weight: 600; border-top: 0.5px solid var(--border); padding-top: 10px; margin-top: 8px; }
  .confirm-wrap { text-align: center; padding: 1rem 0 0.5rem; }
  .confirm-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--green-bg); display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 14px; color: var(--green-text); font-weight: 600; }
  .confirm-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .confirm-sub { font-size: 13px; color: var(--text2); }
  .next-steps { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 18px; border: 0.5px solid var(--border); text-align: left; }
  .next-steps-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .next-step { display: flex; gap: 11px; align-items: flex-start; font-size: 13px; margin-bottom: 10px; line-height: 1.55; }
  .next-step:last-child { margin: 0; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .stat-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .stat-val { font-size: 26px; font-weight: 600; }
  .panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 14px; }
  .panel-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; gap: 8px; }
  .admin-info { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .admin-name { font-weight: 600; font-size: 13px; }
  .admin-sub { font-size: 11px; color: var(--text2); }
  .admin-actions { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .divider { height: 0.5px; background: var(--border); margin: 18px 0; }
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 1.25rem; text-align: center; font-size: 13px; color: var(--text2); cursor: pointer; transition: background .15s; }
  .upload-zone:hover { background: var(--surface2); }
  .img-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; margin-top: 10px; }
  .img-preview { position: relative; height: 72px; border-radius: var(--radius-sm); overflow: hidden; border: 0.5px solid var(--border); }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview .del-img { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .login-wrap { min-height: 300px; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2.25rem 2rem; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
  .login-icon { font-size: 36px; margin-bottom: 12px; }
  .login-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .login-box input { width: 100%; font-size: 18px; text-align: center; letter-spacing: 6px; padding: 11px; margin-bottom: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--mono); background: var(--surface); color: var(--text); outline: none; }
  .login-box input:focus { border-color: var(--accent); }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .admin-header-title { font-size: 17px; font-weight: 600; }
  .loading { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
  @media (max-width: 500px) {
    .detail-imgs { grid-template-columns: 1fr; }
    .thumbs { grid-template-columns: repeat(3, 1fr); }
    .g2 { grid-template-columns: 1fr; }
    .admin-row { flex-direction: column; align-items: flex-start; }
    .admin-actions { width: 100%; }
    .hero h1 { font-size: 1.5rem; }
  }
</style>
</head>

<script>
// ── CONFIG ────────────────────────────────────────────────
var CONFIG = { mpNumber: '22 22 20 00', adminCode: '1234' };
var loggedIn = false;
var addImageFiles = [];

// ── API ───────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body && !(body instanceof FormData)) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (body) {
    opts.body = body;
  }
  const r = await fetch('/api' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── SECTION ───────────────────────────────────────────────
function showSection(s) {
  document.getElementById('section-shop').style.display = s === 'shop' ? 'block' : 'none';
  document.getElementById('section-admin').style.display = s === 'admin' ? 'block' : 'none';
  document.getElementById('tab-shop').classList.toggle('active', s === 'shop');
  document.getElementById('tab-admin').classList.toggle('active', s === 'admin');
  if (s === 'admin' && loggedIn) loadAdminPanel();
}

// ── SHOP ──────────────────────────────────────────────────
function showView(name) {
  document.getElementById('view-list').style.display  = name === 'list'     ? 'block' : 'none';
  document.getElementById('view-detail').style.display   = name === 'detail'   ? 'block' : 'none';
  document.getElementById('view-checkout').style.display = name === 'checkout' ? 'block' : 'none';
  document.getElementById('shop-hero').style.display  = name === 'list'     ? 'block' : 'none';
}

function productThumb(p) {
  if (p.images && p.images.length > 0) return '<img src="' + p.images[0] + '" alt="' + p.name + '" />';
  return '<span class="emoji-fallback">🛴</span>';
}

async function loadShopGrid() {
  try {
    const products = await api('GET', '/products');
    const g = document.getElementById('view-list');
    if (!products.length) { g.innerHTML = '<p style="color:var(--text2);padding:1rem 0;font-size:14px;">Ingen løbehjul til salg lige nu. Kig forbi igen snart!</p>'; return; }
    g.innerHTML = '<div class="grid" id="products-grid"></div>';
    const grid = document.getElementById('products-grid');
    products.forEach(function(p) {
      const d = document.createElement('div');
      d.className = 'card';
      d.innerHTML =
        '<div class="card-img" onclick="openDetail(' + p.id + ')">' + productThumb(p) +
          '<span class="badge ' + (p.sold ? 'so' : 'av') + '">' + (p.sold ? 'Solgt' : 'Ledig') + '</span></div>' +
        '<div class="card-body">' +
          '<div class="card-name">' + p.name + '</div>' +
          '<div class="card-sub">' + p.color + ' · ' + p.age + '</div>' +
          '<div class="card-footer">' +
            '<span class="price">' + (p.sold ? '<s style="color:var(--text3)">' : '') + p.price + ' kr.' + (p.sold ? '</s>' : '') + '</span>' +
            '<div class="btn-row">' +
              '<button class="btn" onclick="openDetail(' + p.id + ')">Vis mere</button>' +
              (p.sold ? '' : '<button class="btn btn-primary" onclick="startCheckout(' + p.id + ')">Køb</button>') +
            '</div></div>' +
          '<div class="views-chip">👁 ' + p.views + ' visninger</div>' +
        '</div>';
      grid.appendChild(d);
    });
  } catch(e) { console.error(e); }
}

async function openDetail(id) {
  const dv = document.getElementById('view-detail');
  dv.innerHTML = '<div class="loading">Henter…</div>';
  showView('detail');
  const p = await api('GET', '/products/' + id);
  const imgs = p.images && p.images.length ? p.images : null;
  let mainImg = imgs ? '<img src="' + imgs[0] + '" id="main-img" alt="' + p.name + '" />' : '<span style="font-size:80px">🛴</span>';
  let thumbsHtml = '';
  if (imgs) {
    imgs.forEach(function(src, i) {

function tryLogin() {
  if (document.getElementById('pw').value === CONFIG.adminCode) {

// ── ADMIN PANEL ───────────────────────────────────────────
async function loadAdminPanel() {
  const [products, stats] = await Promise.all([api('GET', '/products'), api('GET', '/stats')]);
  document.getElementById('stat-front').textContent = stats.front_views;
  document.getElementById('stat-count').textContent = products.length;
  const el = document.getElementById('admin-list');
  el.innerHTML = '';
  if (!products.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text2);">Ingen løbehjul endnu.</p>'; return; }
  products.forEach(function(p) {
    const d = document.createElement('div');
    d.className = 'admin-row';
    const thumb = p.images && p.images.length ? '<img src="' + p.images[0] + '" style="width:36px;height:36px;object-fit:cover;border-radius:6px;" />' : '<span style="font-size:24px;">🛴</span>';
    d.innerHTML =
      '<div class="admin-info">' + thumb +
        '<div><div class="admin-name">' + p.name + '</div>' +
        '<div class="admin-sub">' + p.price + ' kr. · ' + (p.sold ? 'Solgt' : 'Ledig') + ' · 👁 ' + p.views + '</div></div>' +
      '</div>' +
      '<div class="admin-actions">' +
        '<button class="btn" onclick="openEdit(' + p.id + ')">Rediger</button>' +
        '<button class="btn" onclick="toggleSold(' + p.id + ',' + p.sold + ')">' + (p.sold ? 'Sæt ledig' : 'Sæt solgt') + '</button>' +
        '<button class="btn btn-danger" onclick="deleteP(' + p.id + ')">Slet</button>' +
      '</div>';
    el.appendChild(d);
  });
}

async function uploadImages(id, input) {
  const fd = new FormData();
  for (var i = 0; i < input.files.length; i++) fd.append('images', input.files[i]);
  const res = await api('POST', '/products/' + id + '/images', fd);
  const grid = document.getElementById('e-img-grid');
  grid.innerHTML = res.images.map(function(src) {
    return '<div class="img-preview"><img src="' + src + '" /><button class="del-img" onclick="deleteImg(' + id + ',\'' + src + '\')">×</button></div>';
  }).join('');
  input.value = '';
}

async function deleteImg(id, src) {
  const res = await api('DELETE', '/products/' + id + '/images', { url: src });
  const grid = document.getElementById('e-img-grid');
  grid.innerHTML = res.images.map(function(s) {
    return '<div class="img-preview"><img src="' + s + '" /><button class="del-img" onclick="deleteImg(' + id + ',\'' + s + '\')">×</button></div>';
  }).join('');
}
